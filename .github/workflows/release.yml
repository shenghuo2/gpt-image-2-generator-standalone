name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号 (如 v1.0.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package zip
        run: |
          cd out
          zip -r ../gpt-image-standalone.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body: |
            下载 zip 解压后，浏览器打开 `index.html` 即可离线使用。无需服务器，无需安装依赖。
          files: gpt-image-standalone.zip
